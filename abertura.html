<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Iniciando Jornada...</title>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #1a1a1a;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            color: white;
            font-family: 'Press Start 2P', cursive;
            cursor: pointer;
        }

        .click-area {
            text-align: center;
            position: relative;
        }

        /* Pokebola desenhada via CSS/SVG para não falhar */
        .pokeball-svg {
            width: 150px;
            height: 150px;
            animation: rotateBall 3s infinite linear;
            transition: all 0.5s ease-out;
        }

        .instruction {
            margin-top: 30px;
            font-size: 1rem;
            animation: blink 1s infinite;
            color: #ffcb05;
            /* Amarelo Pikachu para destacar */
        }

        .pokeball-animate {
            animation: explodeBall 0.6s forwards !important;
        }

        .flash {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: white;
            opacity: 0;
            z-index: 10;
            pointer-events: none;
        }

        .flash-animate {
            animation: flashLight 0.6s forwards;
        }

        @keyframes rotateBall {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0;
            }
        }

        @keyframes explodeBall {
            0% {
                transform: scale(1);
                opacity: 1;
            }

            50% {
                transform: scale(2);
                opacity: 0.8;
                filter: brightness(2);
            }

            100% {
                transform: scale(10);
                opacity: 0;
            }
        }

        @keyframes flashLight {
            0% {
                opacity: 0;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0;
            }
        }
    </style>
</head>

<body onclick="iniciarJornada()">

    <div class="flash" id="flash"></div>

    <div class="click-area">
        <svg class="pokeball-svg" id="pokeball" viewBox="0 0 100 100">
            <circle cx="50" cy="50" r="48" fill="white" stroke="#333" stroke-width="4" />
            <path d="M2,50 a48,48 0 0,1 96,0 Z" fill="#ee1515" stroke="#333" stroke-width="4" />
            <line x1="2" y1="50" x2="98" y2="50" stroke="#333" stroke-width="8" />
            <circle cx="50" cy="50" r="12" fill="white" stroke="#333" stroke-width="4" />
            <circle cx="50" cy="50" r="6" fill="white" stroke="#333" stroke-width="2" />
        </svg>

        <p class="instruction">CLIQUE NA POKEBOLA</p>
    </div>

    <script>
        function iniciarJornada() {
            const ball = document.getElementById('pokeball');
            const flash = document.getElementById('flash');

            ball.classList.add('pokeball-animate');
            flash.classList.add('flash-animate');

            setTimeout(() => {
                window.location.href = 'index.html';
            }, 600);
        }
    </script>
</body>

</html>
