<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <title>Liga Pokémon da Automação 2026</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="pokedex-frame">
        <header class="mci-header">
            <img src="https://upload.wikimedia.org/wikipedia/commons/5/53/Pok%C3%A9_Ball_icon.svg"
                class="header-icon pokeball">
            <div class="mci-text-center">
                <h1>LIGA DA AUTOMAÇÃO 2026</h1>
                <p>MCI: Automação de processos elegíveis de 0% para 100% até 30/11/2026</p>
            </div>
            <img src="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/pokemon/other/official-artwork/25.png"
                class="header-icon pikachu-main">
        </header>

        <div class="main-content">
            <section class="journey-map">
                <h3>MAPA DA JORNADA</h3>
                <div class="gyms-grid" id="gyms"></div>
            </section>

            <aside class="status-sidebar">
                <div class="card md-card">
                    <h3>MEDIDA DE DIREÇÃO (MD)</h3>
                    <div class="md-content">
                        <p>Reunir com equipes para validação e levantamento de requisitos!</p>
                    </div>
                </div>

                <div class="card hp-card">
                    <div class="hp-header">
                        <h3>HP DA BATALHA</h3>
                        <div class="status-badge" id="global-status">---</div>
                    </div>
                    <div class="hp-bar-container">
                        <div class="hp-bar-fill" id="hp-fill"></div>
                        <div class="target-line" title="Meta: 12.5%"></div>
                    </div>
                    <div class="hp-label">ATUAL: <span id="current-pct">0%</span> | META: <span
                            class="meta-txt">12.5%</span></div>
                </div>

                <div class="card pokedex-card">
                    <h3>POKÉDEX (CAPTURADOS)</h3>
                    <div class="captured-list" id="captured-list"></div>
                </div>
            </aside>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
